# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Frontend - Build and deploy React app to Azure Web App

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v3
        with:
          node-version: '24.x'

      - name: npm install and build
        env:
          REACT_APP_API_URL: 'https://kvtp-backend.azurewebsites.net'
          REACT_APP_STREAM_URL: 'https://sapircast.caster.fm:443/R5a6l'
        run: |
          npm install
          npm run build

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: build

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write #This is required for requesting the JWT

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_715686C4A3CE4482A53A4DE0C4C06F9D }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_9422EA89B9954850AB22A5C5BFDA4840 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_609F2DADB28B48F3945A6250F1F00DE4 }}

      - name: 'Deploy to Azure Web App'
        uses: azure/webapps-deploy@v3
        id: deploy-to-webapp
        with:
          app-name: 'KarVicharTohPamm'
          slot-name: 'Production'
          package: .
          startup-command: 'pm2 serve /home/site/wwwroot --no-daemon --spa'
